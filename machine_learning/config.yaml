project:
  name: amazon_books_sentiment_recommender
  random_state: 42

paths:
  reviews_csv: dataset/Books_rating.csv
  books_csv: dataset/books_data.csv
  processed_reviews_csv: data/processed/processed_reviews.csv
  train_csv: data/processed/train.csv
  validation_csv: data/processed/validation.csv
  test_csv: data/processed/test.csv
  model_registry: models/model_registry.json
  eda_dir: reports/eda
  sentiment_dir: models/sentiment/baseline
  sentiment_transformer_dir: models/sentiment/transformer/distilbert_v1
  recommender_dir: models/recommender
  recommender_report_json: reports/recommender_metrics.json
  training_experiments_dir: reports/experiments
  training_comparison_json: reports/training_mode_comparison.json

data:
  sample_rows: 120000
  min_review_text_length: 5

preprocessing:
  test_size: 0.15
  validation_size: 0.15

sentiment:
  tfidf_max_features: 12000
  tfidf_min_df: 2
  ngram_range: [1, 2]
  tfidf_max_df: 0.95
  tfidf_dtype: float32
  enable_memory_fallback: true

transformer:
  model_name: distilbert-base-uncased
  max_length: 128
  batch_size: 16
  learning_rate: 2.0e-5
  epochs: 3
  early_stopping_patience: 2
  weight_decay: 0.01

recommender:
  min_user_interactions: 3
  min_item_interactions: 3
  latent_factors: 20
  top_k_values: [5, 10]
  candidate_pool_size: 1000

mlflow:
  enabled: true
  experiment_name: amazon_books_sentiment_recommender

training:
  master_ram_limit_gb: 3
  ram_limit_safety_margin_mb: 512
  include_transformer_by_default: false
  auto_run_worker_preprocess: false

hadoop:
  namenode_uri: hdfs://fadhli:9000
  dataset_hdfs_path: /user/fadhli/amazon_books
  output_hdfs_path: /user/fadhli/output/amazon_books_ml
  hdfs_ui_port: 9870
  yarn_ui_port: 8088

spark:
  master: yarn
  deploy_mode: client
  num_executors: 2
  executor_cores: 2
  executor_memory: 2G
  driver_memory: 2G
  py_files: []

spark_preprocess:
  sample_fraction: 1.0
  max_rows: 120000
  log_row_counts: false
  show_label_distribution: false
  output_partitions: 0
