cluster:
  master: fadhli
  workers:
    - fadhli@worker1 # 192.168.0.103
    - fadhli@worker2 # 192.168.0.105
  ssh_user: fadhli
  ssh_timeout: 5
  worker_ips:
    worker1: 192.168.0.103
    worker2: 192.168.0.105

hdfs:
  namenode: hdfs://fadhli:9000
  dataset_path: /user/fadhli/amazon_books
  output_path: /user/fadhli/output/amazon_books_ml
  ui_host: fadhli
  ui_port: 9870

yarn:
  ui_host: fadhli
  ui_port: 8088

spark:
  master: yarn
  deploy_mode: client
  num_executors: 2
  executor_cores: 2
  executor_memory: 2G
  driver_memory: 2G
